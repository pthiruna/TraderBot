<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ETF Historical Performance</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header>
      <div class="header-main">
        <div>
          <h1 id="chart-title">— Historical Performance</h1>
          <div class="subtitle" id="chart-subtitle">Daily Closing Price</div>
        </div>
        <div class="ticker-selector">
          <label class="input-label" for="ticker-select">Ticker</label>
          <select id="ticker-select" class="ticker-select"><option disabled>Loading…</option></select>
        </div>
      </div>
    </header>

    <div id="return-bar" class="return-bar hidden">
      <div class="return-info">
        <div class="return-item">
          <span class="return-label">Range</span>
          <span id="return-dates" class="return-text"></span>
        </div>
        <div class="return-item">
          <span class="return-label">Start Price</span>
          <span id="return-start-price" class="return-text"></span>
        </div>
        <div class="return-item">
          <span class="return-label">End Price</span>
          <span id="return-end-price" class="return-text"></span>
        </div>
        <div class="return-item">
          <span class="return-label">Total Return</span>
          <span id="return-total" class="return-value"></span>
        </div>
        <div class="return-item" id="cagr-item">
          <span class="return-label">CAGR</span>
          <span id="return-cagr" class="return-value"></span>
        </div>
        <div class="return-item">
          <span class="return-label">Duration</span>
          <span id="return-duration" class="return-text"></span>
        </div>
      </div>
    </div>

    <div class="controls">
      <div class="date-inputs">
        <label>
          <span class="input-label">From</span>
          <input type="text" id="date-start" class="date-input" placeholder="Start date" readonly>
        </label>
        <label>
          <span class="input-label">To</span>
          <input type="text" id="date-end" class="date-input" placeholder="End date" readonly>
        </label>
      </div>
      <div class="overlay-buttons">
        <span class="overlay-label">Overlay:</span>
        <button id="btn-ma50" class="btn-overlay" title="50-Day Simple Moving Average">50 MA</button>
        <button id="btn-ma200" class="btn-overlay" title="200-Day Simple Moving Average">200 MA</button>
      </div>
    </div>

    <div id="chart"></div>

    <div class="range-buttons">
      <button class="btn-range" data-range="1W">1W</button>
      <button class="btn-range" data-range="1M">1M</button>
      <button class="btn-range" data-range="3M">3M</button>
      <button class="btn-range" data-range="6M">6M</button>
      <button class="btn-range" data-range="YTD">YTD</button>
      <button class="btn-range" data-range="1Y">1Y</button>
      <button class="btn-range" data-range="3Y">3Y</button>
      <button class="btn-range" data-range="5Y">5Y</button>
      <button class="btn-range" data-range="10Y">10Y</button>
      <button class="btn-range" data-range="Max">Max</button>
    </div>
  </div>

  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="app.js"></script>
</body>
</html>
